<style>
  :root{
    --teal:#005b52;--green:#9fc031;--dark:#13222b;
    --cream:#f7f5ef;--ivory:#fffdf8;--teal-soft:#e3efed;--line:#e6e2d8;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:'Poppins',sans-serif;
    background:
      radial-gradient(circle at 18% 8%, rgba(159,192,49,.12), transparent 45%),
      radial-gradient(circle at 85% 92%, rgba(0,91,82,.20), transparent 50%),
      var(--dark);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:24px 12px;color:var(--dark);
  }
  .phone{
    width:390px;max-width:100%;height:820px;background:var(--ivory);
    border-radius:46px;border:11px solid #0a1419;
    box-shadow:0 40px 90px -20px rgba(0,0,0,.6),0 0 0 2px rgba(159,192,49,.15);
    position:relative;overflow:hidden;display:flex;flex-direction:column;
  }
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:140px;height:26px;background:#0a1419;border-radius:0 0 18px 18px;z-index:50;}
  .statusbar{flex:0 0 auto;height:46px;display:flex;align-items:center;justify-content:space-between;
    padding:6px 26px 0;font-size:13px;font-weight:600;}
  .statusbar .right{display:flex;gap:6px;align-items:center;font-size:12px;}

  .screen{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;}
  .screen::-webkit-scrollbar{display:none;}
  .view{display:none;flex-direction:column;min-height:100%;animation:fade .45s ease;}
  .view.active{display:flex;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .pad{padding:20px 24px 26px;}

  .brand-row{display:flex;align-items:center;gap:10px;}
  .logo-dot{width:34px;height:34px;border-radius:11px;background:linear-gradient(135deg,var(--teal),var(--green));
    display:flex;align-items:center;justify-content:center;font-size:18px;}
  .brand-name{font-family:'Lora',serif;font-weight:600;font-size:16px;color:var(--teal);}
  .brand-sub{font-size:10px;color:#8a8676;letter-spacing:.5px;text-transform:uppercase;}

  .langbar{margin-left:auto;display:flex;gap:4px;background:var(--cream);padding:4px;border-radius:12px;}
  .langbar button{border:none;background:transparent;font-family:'Poppins';font-size:11px;font-weight:600;
    color:#8a8676;padding:5px 9px;border-radius:8px;cursor:pointer;transition:.2s;}
  .langbar button.on{background:var(--teal);color:#fff;}

  h1{font-family:'Lora',serif;font-weight:600;font-size:26px;line-height:1.25;color:var(--dark);margin:24px 0 10px;}
  h1 .accent{color:var(--teal);}
  .lede{font-size:13.5px;color:#6c6857;line-height:1.6;margin-bottom:22px;}
  .step-label{font-size:11px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:var(--green);margin-bottom:13px;}

  .niche{background:var(--ivory);border:1.5px solid var(--line);border-radius:18px;
    padding:15px 17px;margin-bottom:11px;display:flex;align-items:center;gap:13px;cursor:pointer;transition:.22s;}
  .niche:active{transform:scale(.98);}
  .niche.sel{border-color:var(--teal);background:var(--teal-soft);box-shadow:0 8px 20px -10px rgba(0,91,82,.4);}
  .niche .emoji{font-size:22px;width:44px;height:44px;border-radius:13px;background:var(--cream);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .niche.sel .emoji{background:#fff;}
  .niche .txt b{display:block;font-size:14px;font-weight:600;color:var(--dark);}
  .niche .txt span{font-size:11.5px;color:#8a8676;}
  .niche .check{margin-left:auto;width:21px;height:21px;border-radius:50%;border:2px solid var(--line);
    flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;transition:.2s;}
  .niche.sel .check{background:var(--teal);border-color:var(--teal);}

  .lang-out{margin-top:4px;}
  .lang-out .step-label{margin-bottom:10px;}
  .chips{display:flex;gap:8px;flex-wrap:wrap;}
  .chip{border:1.5px solid var(--line);background:var(--ivory);border-radius:13px;padding:9px 14px;
    font-size:13px;font-weight:500;cursor:pointer;transition:.2s;}
  .chip:active{transform:scale(.96);}
  .chip.sel{border-color:var(--green);background:rgba(159,192,49,.14);color:var(--teal);font-weight:600;}

  .btn{background:var(--teal);color:#fff;border:none;border-radius:15px;width:100%;
    padding:16px;font-family:'Poppins';font-size:15px;font-weight:600;cursor:pointer;margin-top:18px;
    transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px;
    box-shadow:0 12px 26px -12px rgba(0,91,82,.7);}
  .btn:active{transform:translateY(2px);}
  .btn.green{background:var(--green);color:var(--dark);box-shadow:0 12px 26px -12px rgba(159,192,49,.8);}
  .btn.ghost{background:transparent;color:var(--teal);border:1.5px solid var(--line);box-shadow:none;margin-top:10px;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}

  .load-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 36px;}
  .rocket{font-size:48px;animation:float 1.6s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0) rotate(-8deg);}50%{transform:translateY(-14px) rotate(2deg);}}
  .load-title{font-family:'Lora',serif;font-size:19px;font-weight:600;color:var(--teal);margin:22px 0 8px;}
  .load-step{font-size:12.5px;color:#8a8676;min-height:38px;transition:.3s;line-height:1.5;}
  .bar{width:100%;height:6px;background:var(--cream);border-radius:6px;margin-top:22px;overflow:hidden;}
  .bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--green));border-radius:6px;transition:width .4s ease;}
  .live-pill{margin-top:18px;font-size:11px;color:var(--green);font-weight:600;letter-spacing:.5px;}

  .result-head{background:linear-gradient(135deg,var(--teal),var(--dark));color:#fff;padding:24px 24px 20px;}
  .result-head .pill{display:inline-block;background:rgba(159,192,49,.22);color:var(--green);font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;}
  .result-head .tag{font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;opacity:.7;margin-top:13px;}
  .result-head h2{font-family:'Lora',serif;font-size:20px;font-weight:600;margin-top:5px;}
  .result-head .meta{font-size:11.5px;opacity:.8;margin-top:7px;}

  .card{background:var(--ivory);border:1.5px solid var(--line);border-radius:18px;padding:17px;margin:14px 24px 0;}
  .card-label{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--green);margin-bottom:11px;}
  .card-label .ic{color:var(--teal);}
  .card h3{font-size:14.5px;font-weight:600;color:var(--dark);line-height:1.45;}
  .card p{font-size:13px;color:#5c584a;line-height:1.65;}
  .tags{display:flex;flex-wrap:wrap;gap:7px;}
  .tags span{background:var(--teal-soft);color:var(--teal);font-size:11.5px;font-weight:500;padding:6px 11px;border-radius:20px;}

  .polaroid{background:#fff;padding:10px 10px 16px;border-radius:6px;box-shadow:0 10px 24px -12px rgba(0,0,0,.3);
    margin:0 auto;width:190px;transform:rotate(-2deg);}
  .polaroid .img{height:190px;border-radius:3px;background:
      radial-gradient(circle at 30% 30%, var(--green), transparent 60%),
      linear-gradient(150deg,var(--teal),var(--dark));
      display:flex;align-items:center;justify-content:center;color:#fff;text-align:center;padding:18px;font-family:'Lora',serif;}
  .polaroid .img span{font-size:15px;font-weight:600;line-height:1.3;}
  .polaroid .cap{text-align:center;font-size:10.5px;color:#8a8676;margin-top:8px;font-family:'Poppins';}

  .copy-note{font-size:11px;color:#a8a494;text-align:center;margin:16px 24px 4px;}
  .footer-cta{padding:6px 24px 24px;}

  .market-head{padding:24px 24px 6px;}
  .market-head .pill{display:inline-block;background:rgba(0,91,82,.12);color:var(--teal);font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;}

  .market-head h2 .accent{color:var(--teal);}
  .stats{display:flex;gap:11px;padding:14px 24px 0;}
  .stat{flex:1;background:var(--dark);color:#fff;border-radius:18px;padding:16px 14px;text-align:center;}
  .stat.alt{background:linear-gradient(135deg,var(--teal),var(--dark));}
  .stat .num{font-family:'Lora',serif;font-size:26px;font-weight:600;color:var(--green);}
  .stat .lbl{font-size:10.5px;opacity:.85;margin-top:4px;line-height:1.3;}

  .model{margin:16px 24px 0;background:var(--ivory);border:1.5px solid var(--line);border-radius:18px;overflow:hidden;}

  .model .row span{font-size:12px;color:#8a8676;}

  .why{margin:16px 24px 0;}

  .why .item p b{color:var(--dark);}

  .dots i{width:7px;height:7px;border-radius:50%;background:var(--line);transition:.3s;}
  .dots i.on{background:var(--teal);width:20px;border-radius:7px;}

  .err{margin:14px 24px;padding:13px 15px;background:#fdeceb;border:1px solid #f5c6c2;border-radius:14px;

const NICHES = {
  tr:[['🧠','ADHD & Odaklanma','Çalışma kitapları, planlayıcılar'],['🌿','Anksiyete & Sakinlik','Self-therapy rehberleri'],['🎨','Boyama Kitabı','Mandala, doodle, mindful'],['📓','Günlük & Journal','Şükran, niyet, ruh hali']],
  en:[['🧠','ADHD & Focus','Workbooks, planners'],['🌿','Anxiety & Calm','Self-therapy guides'],['🎨','Coloring Book','Mandala, doodle, mindful'],['📓','Journal & Diary','Gratitude, intention, mood']],
  de:[['🧠','ADHS & Fokus','Arbeitsbücher, Planer'],['🌿','Angst & Ruhe','Selbsttherapie-Guides'],['🎨','Malbuch','Mandala, Doodle, achtsam'],['📓','Journal & Tagebuch','Dankbarkeit, Absicht, Stimmung']],
  fr:[['🧠','TDAH & Concentration','Cahiers, agendas'],['🌿','Anxiété & Calme','Guides d\'auto-thérapie'],['🎨','Livre de coloriage','Mandala, doodle, pleine conscience'],['📓','Journal intime','Gratitude, intention, humeur']]
};
const OUTLANGS = [['English','🇬🇧 English'],['German','🇩🇪 Deutsch'],['French','🇫🇷 Français'],['Spanish','🇪🇸 Español'],['Turkish','🇹🇷 Türkçe']];

let lang='tr', selectedNiche=null, outLang='English';

function setLang(l){lang=l;document.querySelectorAll('#langbar button').forEach(b=>b.classList.toggle('on',b.dataset.l===l));renderUI();}

function renderUI(){
  const t=T[lang];
  document.getElementById('h1').innerHTML=t.h1a+'<br><span class="accent">'+t.h1b+'</span>';
  document.getElementById('lede').textContent=t.lede;
  document.getElementById('lab1').textContent=t.lab1;
  document.getElementById('lab2').textContent=t.lab2;
  document.getElementById('goTxt').textContent=t.go;
  document.getElementById('loadTitle').textContent=t.loadTitle;
  const nc=document.getElementById('niches');nc.innerHTML='';
  NICHES[lang].forEach((n,idx)=>{
    const d=document.createElement('div');d.className='niche';
    d.innerHTML=`<div class="emoji">${n[0]}</div><div class="txt"><b>${n[1]}</b><span>${n[2]}</span></div><div class="check">✓</div>`;
    d.onclick=()=>pickNiche(idx,d);
    if(selectedNiche===idx)d.classList.add('sel');
    nc.appendChild(d);
  });
  const ol=document.getElementById('outlangs');ol.innerHTML='';
  OUTLANGS.forEach(o=>{
    const c=document.createElement('div');c.className='chip'+(outLang===o[0]?' sel':'');
    c.textContent=o[1];c.onclick=()=>{outLang=o[0];renderUI();};ol.appendChild(c);
  });
}
function pickNiche(idx,el){selectedNiche=idx;document.querySelectorAll('.niche').forEach(n=>n.classList.remove('sel'));el.classList.add('sel');document.getElementById('goBtn').disabled=false;}
function show(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelector('.screen').scrollTop=0;}

const loadSteps={
  tr:['Niş analiz ediliyor…','Pazar trendleri taranıyor…','SEO başlığı yazılıyor…','Açıklama üretiliyor…','Etiketler optimize ediliyor…'],
  en:['Analyzing niche…','Scanning market trends…','Writing SEO title…','Generating description…','Optimizing tags…'],
  de:['Nische wird analysiert…','Markttrends…','SEO-Titel…','Beschreibung…','Tags…'],
  fr:['Analyse de la niche…','Tendances…','Titre SEO…','Description…','Tags…']
};

async function go(){
  show('v2');
  const t0=Date.now();
  const steps=loadSteps[lang];
  const stepEl=document.getElementById('loadStep');
  const bar=document.getElementById('barFill');
  let i=0;bar.style.width='0';
  const anim=setInterval(()=>{stepEl.textContent=steps[i%steps.length];bar.style.width=Math.min(90,(i+1)/steps.length*100)+'%';i++;},650);

  const niche=NICHES[lang][selectedNiche][1];
  try{
    const r=await fetch('/api/generate',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({niche,outName:outLang})
    });
    if(!r.ok)throw new Error('api');
    const result=await r.json();
    clearInterval(anim);bar.style.width='100%';
    const secs=((Date.now()-t0)/1000).toFixed(1);
    setTimeout(()=>renderResult(result,niche,secs),350);
  }catch(e){clearInterval(anim);renderError();}
}

function renderResult(r,niche,secs){
  const t=T[lang];
  document.getElementById('resPill').textContent=t.pill;
  document.getElementById('resTag').textContent=t.tag;
  document.getElementById('resTitle').textContent=r.product||niche;
  document.getElementById('resMeta').textContent='📦 Etsy · '+secs+' '+t.metaWord;
  document.getElementById('resNote').textContent=t.note;
  document.getElementById('seeMarket').textContent=t.seeMarket;
  document.getElementById('again').textContent=t.again;
  const coverWords=(r.cover||r.product||'').split('/').map(s=>s.trim()).join('<br>');
  const tagsHtml=(r.tags||[]).map(x=>`<span>${escapeHtml(x)}</span>`).join('');
  document.getElementById('resBody').innerHTML=`
    <div class="card"><div class="card-label"><span class="ic">🎯</span> ${t.title}</div><h3>${escapeHtml(r.title||'')}</h3></div>
    <div class="card"><div class="card-label"><span class="ic">📝</span> ${t.desc}</div><p>${escapeHtml(r.description||'')}</p></div>
    <div class="card"><div class="card-label"><span class="ic">🏷️</span> ${t.tags}</div><div class="tags">${tagsHtml}</div></div>
    <div class="card"><div class="card-label"><span class="ic">🖼️</span> ${t.cover}</div><div class="polaroid"><div class="img"><span>${coverWords}</span></div><div class="cap">${t.coverCap}</div></div></div>`;
  show('v3');
}

function renderError(){
  const msg={tr:'Şu an üretim yapılamadı. Birkaç saniye sonra tekrar dene — sistem yoğun olabilir.',
    en:'Could not generate right now. Please try again in a few seconds.'}[lang]||'Tekrar dene.';
  document.getElementById('resPill').textContent='⚠';
  document.getElementById('resTag').textContent='';
  document.getElementById('resTitle').textContent='—';
  document.getElementById('resMeta').textContent='';
  document.getElementById('resBody').innerHTML=`<div class="err">${msg}</div>`;
  document.getElementById('resNote').textContent='';
  document.getElementById('seeMarket').textContent=T[lang].seeMarket;
  document.getElementById('again').textContent=T[lang].again;
  show('v3');
}

function escapeHtml(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function reset(){selectedNiche=null;document.getElementById('goBtn').disabled=true;renderUI();show('v1');}

function renderMarket(){
  const t=T[lang];
  document.getElementById('mPill').textContent=t.mPill;
  document.getElementById('mTitle').innerHTML=t.mTitleA+'<br><span class="accent">'+t.mTitleB+'</span>';
  document.getElementById('s1').textContent=t.s1;document.getElementById('s2').textContent=t.s2;document.getElementById('s3').textContent=t.s3;
  document.getElementById('p1n').textContent=t.p1n;document.getElementById('p1d').textContent=t.p1d;document.getElementById('p1p').textContent=t.p1p;
  document.getElementById('p2n').textContent=t.p2n;document.getElementById('p2d').textContent=t.p2d;
  document.getElementById('p3n').textContent=t.p3n;document.getElementById('p3d').textContent=t.p3d;
  document.getElementById('w1').innerHTML=t.w1;document.getElementById('w2').innerHTML=t.w2;document.getElementById('w3').innerHTML=t.w3;document.getElementById('w4').innerHTML=t.w4;
  document.getElementById('restart').textContent=t.restart;
}

renderUI();
</script>
</body>
</html>
